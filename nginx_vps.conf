# Sentinel Dashboard - Nginx Reverse Proxy Config
# Use this to map port 80 to 8000 and add SSL later.

server {
    listen 80;
    server_name 34.26.143.224;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logging
    access_log C:/nginx/logs/sentinel_access.log;
    error_log C:/nginx/logs/sentinel_error.log;
}
