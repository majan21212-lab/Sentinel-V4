<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jewel Elite | Institutional Execution</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="static/assets/gab_logo.png" alt="G.A.B Logo" style="height: 40px; width: 40px;">
            <h1>JEWEL <span style="font-weight: 300; opacity: 0.5;">ELITE</span></h1>
        </div>

        <div class="header-center">
            <button id="master-activation-btn" class="activate-btn" onclick="toggleBot()">
                <span class="btn-ripple"></span>
                <span id="activation-text">ACTIVATE BOT</span>
            </button>
        </div>

        <div class="status-indicator">
            <div class="card glass balance-card">
                <span style="font-size: 0.6rem; opacity: 0.6;">VIRTUAL TREASURY</span>
                <div id="balance-display">$200.00</div>
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        <section class="main-column">
            <!-- Professional TradingView Chart -->
            <div class="card glass chart-container" style="padding: 0; overflow: hidden; height: 500px;">
                <div id="TV_CHART_HOLDER" style="width: 100%; height: 100%;">
                    <!-- TradingView Widget BEGIN -->
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                        {
                        "autosize": true,
                        "symbol": "OANDA:XAUUSD",
                        "interval": "15",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "enable_publishing": false,
                        "allow_symbol_change": true,
                        "calendar": false,
                        "support_host": "https://www.tradingview.com"
                        }
                        </script>
                    </div>
                </div>
            </div>

            <div class="card glass">
                <div class="card-title">Detection Feed</div>
                <div class="signal-feed" id="signal-list"></div>
            </div>
        </section>

        <aside class="side-column">
            <div class="card glass">
                <div class="card-title">Bot Configuration</div>
                <div class="control-group">
                    <label>Execution Bias</label>
                    <div class="bias-switcher">
                        <button class="bias-btn active" id="bias-trend" onclick="setBias('TREND')">TREND ONLY</button>
                        <button class="bias-btn" id="bias-ai" onclick="setBias('AI_BILATERAL')">AI BILATERAL</button>
                    </div>
                    <p style="font-size: 10px; color: var(--text-secondary); margin-top: 10px;" id="bias-desc">
                        *Trend Mode: Only follows institutional flow (EMA200).
                    </p>
                </div>
            </div>

            <div class="card glass" style="margin-top: 20px;">
                <div class="card-title">System Diagnostics</div>
                <div id="diagnostic-log" style="font-family: monospace; font-size: 10px; color: #10B981; height: 100px; overflow-y: auto;">
                    [SYSTEM] Dashboard initialized. Waiting for Core...<br>
                    [SYSTEM] Syncing with VPS on F: drive...
                </div>
            </div>
        </aside>
    </main>

    <div class="status-bar glass">
        <div class="status-item"><span class="text-secondary">SYSTEM:</span> <span id="system-status">STANDBY</span></div>
        <div class="status-item"><span class="text-secondary">MODE:</span> <span id="current-mode">PATTERN</span></div>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
