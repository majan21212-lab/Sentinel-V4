<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jewel Elite | Institutional Execution</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="static/assets/gab_logo.png" alt="G.A.B Logo" style="height: 40px; width: 40px;">
            <h1>JEWEL <span style="font-weight: 300; opacity: 0.5;">ELITE</span></h1>
        </div>

        <div class="header-center">
            <button id="master-activation-btn" class="activate-btn" onclick="toggleBot()">
                <span id="activation-text">INVOKE CORE ENGINE</span>
            </button>
        </div>

        <div class="status-indicator">
            <div class="card glass balance-card">
                <div id="balance-display">$3,968.82</div>
                <div id="equity-display" class="free-margin">Free margin: $3,940.08</div>
                <div id="demo-deposit-container" style="display: none; margin-top: 10px; justify-content: space-between; gap: 10px;">
                    <input type="number" id="deposit-amount" placeholder="Amount ($)" class="config-input" style="width: 60%; padding: 4px;">
                    <button onclick="depositFunds()" class="activate-btn" style="flex: 1; padding: 4px; font-size: 0.8rem;">Deposit</button>
                </div>
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        <section class="main-column">
            <!-- Professional TradingView Chart -->
            <div class="card glass chart-container" style="padding: 0; overflow: hidden; height: 450px;">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
                    <script src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js">
                    {
                        "autosize": true,
                        "symbol": "OANDA:XAUUSD",
                        "interval": "15",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "enable_publishing": false,
                        "allow_symbol_change": true,
                        "calendar": false,
                        "support_host": "https://www.tradingview.com"
                    }
                    </script>
                </div>
            </div>

            <!-- Professional Terminal -->
            <div class="card glass terminal-container">
                <div class="terminal-header">
                    <div class="card-title">Institutional Terminal</div>
                    <div class="terminal-tabs">
                        <button class="tab-btn active" onclick="setTerminalTab('active')">Open</button>
                        <button class="tab-btn" onclick="setTerminalTab('pending')">Pending</button>
                        <button class="tab-btn" onclick="setTerminalTab('history')">Closed</button>
                    </div>
                </div>
                <div class="terminal-content">
                    <table class="terminal-table" id="terminal-table">
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>Type</th>
                                <th>Entry</th>
                                <th>TP/SL</th>
                                <th>PnL</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="terminal-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <aside class="side-column">
            <div class="card glass">
                <div class="card-title">Performance Heatmap</div>
                <div id="heatmap-container" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 10px;">
                    <!-- 28 days of performance simulated -->
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.8; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.4; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--danger); opacity: 0.5; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.9; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.6; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 1; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.3; height: 12px; border: none;"></div>
                    <!-- Repeat for more rows -->
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.5; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.7; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--danger); opacity: 0.8; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.4; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.8; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.2; height: 12px; border: none;"></div>
                    <div class="chip" style="background: var(--accent-neon); opacity: 0.9; height: 12px; border: none;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-secondary); margin-top: 10px;">
                    <span>Last 28 Days</span>
                    <span>94% Accuracy</span>
                </div>
            </div>

            <div class="card glass">
                <div class="card-title" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Detection Feed</span>
                    <select id="signal-filter" onchange="renderSignals(lastSignalArray)" style="background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--accent-neon); border-radius: 4px; padding: 2px; font-size: 0.7rem;">
                        <option value="ALL">All Signals</option>
                        <option value="LONG">Buy (Long)</option>
                        <option value="SHORT">Sell (Short)</option>
                    </select>
                </div>
                <div class="signal-feed" id="signal-list">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="card glass">
                <div class="card-title">Active Markets</div>
                <div id="market-checkboxes" style="margin-top: 10px; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px;">
                    <!-- Populated by JS -->
                </div>
                <button class="activate-btn" onclick="saveMarkets()" style="margin-top: 10px; width: 100%; font-size: 0.8rem; padding: 8px;">Apply Markets</button>
            </div>

            <div class="card glass">
                <div class="card-title">Broker Connectivity</div>
                <div class="control-group" style="margin-top: 10px;">
                    <label>Active Platform</label>
                    <select class="config-select" id="active-broker-select" style="width: 100%; margin-top: 8px; border-color: var(--accent-neon);">
                        <option value="DEMO">Demo Simulation</option>
                        <option value="MT5">MetaTrader 5 (Exness/XTB)</option>
                        <option value="BINANCE">Binance Global</option>
                        <option value="OKX">OKX Institutional</option>
                    </select>
                </div>
                <div id="broker-credentials" style="display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                    <input type="password" id="api-key-input" placeholder="API Key" class="config-input" style="width: 100%; margin-bottom: 8px;">
                    <input type="password" id="api-secret-input" placeholder="API Secret" class="config-input" style="width: 100%; margin-bottom: 8px;">
                    <button class="activate-btn" onclick="saveCredentials()" style="width: 100%; font-size: 0.8rem; padding: 8px;">Link Wallet</button>
                </div>
            </div>

            <div class="card glass">
                <div class="card-title">Bot Configuration</div>
                <div class="control-group">
                    <label>Strategy Mode</label>
                    <select class="config-select" id="strategy-mode-select" onchange="updateConfig('strategy_mode', this.value)" style="width: 100%; margin-top: 8px;">
                        <option value="PATTERN">Institutional Pattern</option>
                        <option value="GRID">High-Freq Grid</option>
                        <option value="DCA">DCA (Martingale Hybrid)</option>
                    </select>
                </div>
            </div>
        </aside>
    </main>

    <script src="static/app.js?v=1.0.5"></script>
</body>
</html>
