<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jewel Elite | Desktop Dashboard</title>
    <link rel="stylesheet" href="/static/style.css?v=6.2">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="logo-section">
                <span class="logo-icon">💎</span>
                <h1>JEWEL ELITE</h1>
            </div>
            
            <div class="master-control">
                <label class="switch">
                    <input type="checkbox" id="auto-trade-toggle" onchange="toggleAutoTrade(this)">
                    <span class="slider round"></span>
                </label>
                <div id="status-badge" class="status-badge offline">OFFLINE</div>
            </div>
        </header>

        <!-- Main Dashboard Feed -->
        <main id="tab-dashboard" class="tab-content active">
            <section class="symbol-card glass-card" id="card-XAUUSDm">
                <div class="card-header">
                    <h2>XAUUSDm (Gold)</h2>
                    <span class="price-display" id="price-XAUUSDm">0.00</span>
                </div>
                <div class="chart-container" id="chart-XAUUSDm"></div>
            </section>

            <section class="symbol-card glass-card" id="card-BTCUSDm">
                <div class="card-header">
                    <h2>BTCUSDm</h2>
                    <span class="price-display" id="price-BTCUSDm">0.00</span>
                </div>
                <div class="chart-container" id="chart-BTCUSDm"></div>
            </section>

            <section class="signal-section glass-card">
                <div class="card-header">
                    <h2>SIGNAL FEED</h2>
                    <span class="view-all">LIVE</span>
                </div>
                <div class="signal-list" id="signal-list">
                    <div class="empty-state">Waiting for institutional patterns...</div>
                </div>
            </section>
        </main>

        <!-- Risk & Strategy Settings -->
        <main id="tab-settings" class="tab-content">
            <div class="glass-card settings-panel">
                <div class="card-header">
                    <h2>INSTITUTIONAL RISK CONSOLE</h2>
                </div>
                
                <div class="setting-group">
                    <label>Master Daily Loss Limit (%)</label>
                    <div class="slider-container">
                        <input type="range" id="input-daily-loss" min="0.5" max="10" step="0.5" onchange="updateRiskSettings()">
                        <span id="label-daily-loss">2.0%</span>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Gold (XAUUSD) Risk per Trade</label>
                    <div class="slider-container">
                        <input type="range" id="input-risk-XAUUSDm" min="0.1" max="5" step="0.1" onchange="updateRiskSettings()">
                        <span id="label-risk-XAUUSDm">1.0%</span>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Bitcoin (BTCUSD) Risk per Trade</label>
                    <div class="slider-container">
                        <input type="range" id="input-risk-BTCUSDm" min="0.1" max="5" step="0.1" onchange="updateRiskSettings()">
                        <span id="label-risk-BTCUSDm">2.0%</span>
                    </div>
                </div>
                
                <p class="settings-hint">Strategy: Top-Down SMC (H1 Anchors + M5 Entries)</p>
            </div>

            <div class="glass-card settings-panel performance-card">
                <div class="card-header">
                    <h2>STRATEGY PERFORMANCE</h2>
                </div>
                <div id="analytics-container" class="analytics-list">
                    <div class="empty-state">Calculating win rates...</div>
                </div>
            </div>
        </main>

        <!-- Visual Heartbeat (Verification) -->
        <div id="ui-heartbeat" style="position:fixed; top:5px; left:5px; font-size:10px; color:rgba(255,255,255,0.3); z-index:9999;">
            System v6.2 (Active)
        </div>

        <!-- Navigation Bar -->
        <nav class="bottom-nav glass-nav">
            <button class="nav-item active" id="nav-dashboard" onclick="showTab('dashboard')">
                <span class="icon">📊</span>
                <span class="label">Feed</span>
            </button>
            <button class="nav-item" id="nav-settings" onclick="showTab('settings')">
                <span class="icon">⚙️</span>
                <span class="label">Settings</span>
            </button>
            <button class="nav-item panic-btn" onclick="closeAll()">
                <span class="icon">🛑</span>
                <span class="label">Panic</span>
            </button>
        </nav>
    </div>

    <!-- Diagnostic Console (Visible for debugging) -->
    <div id="debug-layer" style="position:fixed; bottom:90px; left:10px; right:10px; z-index:9999; pointer-events:none;">
        <div id="debug-console" style="background:rgba(0,0,0,0.8); border:1px solid #FF3B30; border-radius:10px; padding:10px; font-family:monospace; font-size:10px; color:#FF3B30; max-height:100px; overflow-y:auto; pointer-events:auto; display:none;">
            <strong>System Logs:</strong><br>
        </div>
    </div>

    <script src="/static/app.js?v=7.0"></script>
</body>
</html>
