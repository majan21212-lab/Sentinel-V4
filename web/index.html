<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G.A.B | General Automation Bot</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="static/assets/gab_logo.png" alt="G.A.B Logo" style="height: 40px; width: 40px;">
            <h1>G.A.B <span style="font-weight: 300; opacity: 0.5;">CORE</span></h1>
        </div>

        <div class="strategy-tabs">
            <button class="tab-btn active" onclick="setStrategy('PATTERN')">PATTERN</button>
            <button class="tab-btn grid" onclick="setStrategy('GRID')">GRID</button>
            <button class="tab-btn dca" onclick="setStrategy('DCA')">DCA</button>
        </div>

        <div class="status-indicator">
            <div class="status-badge online" id="connection-status">
                <span class="pulse"></span> LIVE SYNC
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        <section class="main-column">
            <div class="card glass">
                <div class="card-title">
                    <span>Market Reasoning</span>
                    <span id="active-symbol">XAU/USD</span>
                </div>
                <!-- Price Display -->
                <div style="font-size: 3rem; font-weight: 900; margin-bottom: 20px;" id="live-price">$0.00</div>
                
                <!-- Strategy Diagnostics -->
                <div id="diagnostic-console" style="background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; color: #10B981; border: 1px solid rgba(255,255,255,0.05);">
                    [SYSTEM] G.A.B Core v1.0 Operational...<br>
                    [SYSTEM] Awaiting pulse from cloud...
                </div>
            </div>

            <div class="card glass">
                <div class="card-title">Detection Feed</div>
                <div class="signal-feed" id="signal-list">
                    <!-- Signals populated by JS -->
                </div>
            </div>
        </section>

        <aside class="side-column">
            <div class="card glass">
                <div class="card-title">Bot Controls</div>
                <div class="control-group" style="display: flex; flex-direction: column; gap: 20px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>Auto-Execution</span>
                        <input type="checkbox" id="auto-trade-toggle">
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>Demo Mode</span>
                        <input type="checkbox" id="demo-toggle" checked>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <div class="status-bar glass">
        <div class="status-item">
            <span class="text-secondary">MODE:</span>
            <span id="current-mode">PATTERN</span>
        </div>
        <div class="status-item">
            <span class="text-secondary">LATENCY:</span>
            <span id="ping-timer">0ms</span>
        </div>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
