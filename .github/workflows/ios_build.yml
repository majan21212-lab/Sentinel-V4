name: Build iOS Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ACTIONS_RUNNER_FORCE_NODE24: true

jobs:
  build:
    name: Build Jewel Elite (No Sign)
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build App Bundle
        run: |
          cd iOSApp
          # Create a premium Info.plist if not exists (required for iOS apps)
          if [ ! -f Info.plist ]; then
            cat <<EOF > Info.plist
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleExecutable</key>
  <string>JewelElite</string>
  <key>CFBundleIdentifier</key>
  <string>com.sentinel.jewelelite</string>
  <key>CFBundleName</key>
  <string>JewelElite</string>
  <key>CFBundleShortVersionString</key>
  <string>4.0</string>
  <key>CFBundleVersion</key>
  <string>1</string>
  <key>MinimumOSVersion</key>
  <string>15.0</string>
  <key>LSRequiresIPhoneOS</key>
  <true/>
  <key>UILaunchScreen</key>
  <dict/>
  <key>UISupportedInterfaceOrientations</key>
  <array>
    <string>UIInterfaceOrientationPortrait</string>
  </array>
</dict>
</plist>
EOF
          fi

          # Build using xcodebuild (targeting Generic iOS Device)
          xcodebuild build \
            -scheme JewelElite \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build_output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Structure
        run: |
          mkdir -p Payload/JewelElite.app
          
          echo "Searching for JewelElite binary..."
          # More robust search for the binary
          BINARY_PATH=$(find iOSApp/build_output -name "JewelElite" -type f | grep -i "Release-iphoneos" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            echo "Binary not found in Release-iphoneos, searching everywhere in build_output..."
            BINARY_PATH=$(find iOSApp/build_output -name "JewelElite" -type f | head -n 1)
          fi
          
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: Binary 'JewelElite' not found in build output."
            echo "Build output contents:"
            find iOSApp/build_output -maxdepth 4
            exit 1
          fi
          
          echo "Found binary at: $BINARY_PATH"
          cp "$BINARY_PATH" Payload/JewelElite.app/JewelElite
          chmod +x Payload/JewelElite.app/JewelElite
          
          # Copy the Info.plist into the .app bundle
          cp iOSApp/Info.plist Payload/JewelElite.app/Info.plist
          
          # Zip the Payload directory to create the IPA
          zip -r JewelElite_Unsigned.ipa Payload

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeBot_iOS_Installer
          path: JewelElite_Unsigned.ipa
          retention-days: 7
