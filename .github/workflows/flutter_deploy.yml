name: Jewel Elite Mobile Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Multi-Platform Installer
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd FlutterApp
          flutter pub get

      - name: Build Android APK
        run: |
          cd FlutterApp
          flutter build apk --release

      - name: Build iOS IPA (Unsigned)
        run: |
          cd FlutterApp
          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -vr JewelElite_v4.ipa Payload/

      - name: Upload Android Installer
        uses: actions/upload-artifact@v4
        with:
          name: JewelElite_Android_APK
          path: FlutterApp/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload iOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: JewelElite_iOS_IPA
          path: FlutterApp/JewelElite_v4.ipa
