name: Deploy TradeBot to GCP

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: project-74a8fea6-391c-458b-832
  GCP_REGION: us-central1
  GCP_ZONE: us-central1-a
  INSTANCE_NAME: majan21212-bot
  WIF_PROVIDER: projects/217006324676/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-deployer@project-74a8fea6-391c-458b-832.iam.gserviceaccount.com

jobs:
  deploy-to-vps:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WIF_PROVIDER }}'
          service_account: '${{ env.WIF_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Trigger VPS Update
        run: |
          echo "Resetting GCP Instance $INSTANCE_NAME to trigger startup script (git pull & restart)..."
          gcloud compute instances reset ${{ env.INSTANCE_NAME }} --zone=${{ env.GCP_ZONE }} --project=${{ env.PROJECT_ID }} --quiet

