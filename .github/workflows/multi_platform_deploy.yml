# Triggering fresh build v2 - marketStream naming fix
name: Jewel Elite Multi-Platform Suite

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ACTIONS_RUNNER_FORCE_NODE24: true

jobs:
  # 1. MOBILE BUILD (Android & iOS)
  mobile-build:
    name: Mobile Build (Android & iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Initialize Flutter Project
        run: |
          cd FlutterApp
          flutter create . --platforms=android,ios --org com.jewelelite.bot
          flutter pub get
        shell: bash

      - name: Build Android APK
        run: |
          cd FlutterApp
          flutter build apk --release
        shell: bash

      - name: Build iOS (Unsigned)
        run: |
          cd FlutterApp
          flutter build ios --release --no-codesign
        shell: bash

      - name: Package iOS IPA
        run: |
          cd FlutterApp
          mkdir -p Payload
          # The Runner.app is located in build/ios/iphoneos/
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -vr ../JewelElite_v4.ipa Payload/
        shell: bash

      - name: Upload Mobile Installers
        uses: actions/upload-artifact@v4
        with:
          name: JewelElite_Mobile_Installers
          path: |
            FlutterApp/build/app/outputs/flutter-apk/app-release.apk
            JewelElite_v4.ipa

  # 2. DESKTOP BUILD (Windows, macOS, Linux)
  desktop-build:
    name: Desktop Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev
        shell: bash

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ "$RUNNER_OS" == "Windows" ]; then
            pip install -r requirements.txt
          else
            # Filter out MetaTrader5 for Linux/macOS
            grep -v "MetaTrader5" requirements.txt > reqs_linux.txt
            pip install -r reqs_linux.txt
          fi
        shell: bash

      - name: Build Executable
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then SEP=";"; else SEP=":"; fi
          
          # Ensure required JSON files exist to prevent PyInstaller crash
          [ ! -f config.json ] && echo "{}" > config.json
          [ ! -f risk_settings.json ] && echo "{}" > risk_settings.json
          [ ! -f shared_state.json ] && echo "{}" > shared_state.json
          [ ! -f .env.example ] && touch .env.example

          pyinstaller --onefile --name "JewelElite_Bot_${{ matrix.os }}" \
            --add-data ".env.example${SEP}." \
            --add-data "config.json${SEP}." \
            --add-data "risk_settings.json${SEP}." \
            --add-data "shared_state.json${SEP}." \
            --add-data "web${SEP}web" \
            --collect-all fastapi \
            --collect-all uvicorn \
            --collect-all pydantic \
            main.py
        shell: bash

      - name: Upload Desktop Installer
        uses: actions/upload-artifact@v4
        with:
          name: JewelElite_Desktop_${{ matrix.os }}
          path: dist/*
