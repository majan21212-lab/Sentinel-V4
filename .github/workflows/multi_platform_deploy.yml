name: Jewel Elite Multi-Platform Suite

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. MOBILE BUILD (Android & iOS)
  mobile-build:
    name: Mobile Build (Android & iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Initialize & Build Flutter
        run: |
          cd FlutterApp
          # Ensure directories exist
          flutter create . --platforms=android,ios --namespace=com.jewelelite.bot
          flutter pub get
          # Build Android
          flutter build apk --release
          # Build iOS (Unsigned)
          flutter build ios --release --no-codesign
          # Package IPA manually
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -vr ../JewelElite_v4.ipa Payload/
        shell: bash

      - name: Upload Mobile Installers
        uses: actions/upload-artifact@v4
        with:
          name: JewelElite_Mobile_Installers
          path: |
            FlutterApp/build/app/outputs/flutter-apk/app-release.apk
            JewelElite_v4.ipa

  # 2. DESKTOP BUILD (Windows, macOS, Linux)
  desktop-build:
    name: Desktop Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev
        shell: bash

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ runner.os }}" == "Windows" ]; then
            pip install pyinstaller -r requirements.txt
          else
            # Filter out MetaTrader5 for Linux/macOS
            grep -v "MetaTrader5" requirements.txt > reqs_linux.txt
            pip install pyinstaller -r reqs_linux.txt
          fi
        shell: bash

      - name: Build Executable
        run: |
          pyinstaller --onefile --name "JewelElite_Bot_${{ matrix.os }}" main.py
        shell: bash

      - name: Upload Desktop Installer
        uses: actions/upload-artifact@v4
        with:
          name: JewelElite_Desktop_${{ matrix.os }}
          path: dist/*
