<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumTrade Visualizer | RSI + MA Crossover</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="logo">QuantumTrade Visualizer</div>
            <div class="controls">
                <span class="status-badge status-live">DEMO MODE</span>
                <button class="btn" id="refresh-btn">REFRESH DATA</button>
            </div>
        </header>
        <div class="main-content">
            <aside class="sidebar">
                <section class="card">
                    <h3>Strategy Overview</h3>
                    <p style="font-size: 0.8rem; line-height: 1.4;">
                        RSI & MA Confluence Strategy<br>
                        Long: Cross SMA 9/21 + RSI < 70<br>
                        Short: Cross SMA 9/21 + RSI > 30
                    </p>
                </section>

                <section class="card">
                    <h3>Live Metrics</h3>
                    <div class="indicator-row">
                        <span>SMA 9:</span> <span id="val-sma9" class="value">-</span>
                    </div>
                    <div class="indicator-row">
                        <span>SMA 21:</span> <span id="val-sma21" class="value">-</span>
                    </div>
                    <div class="indicator-row">
                        <span>RSI (14):</span> <span id="val-rsi" class="value">-</span>
                    </div>
                </section>

                <section class="card">
                    <h3>Signals Log</h3>
                    <div id="signals-container">
                        <!-- Signals will be populated here -->
                    </div>
                </section>

                <section class="card">
                    <h3>Risk Management</h3>
                    <div style="font-size: 0.85rem;">
                        TP: +2.0% ($204.00)<br>
                        SL: -1.0% ($198.00)<br>
                        Capital: $200.00
                    </div>
                </section>
            </aside>

            <main class="chart-section">
                <div id="chart-container"></div>
                <div id="rsi-container"></div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
